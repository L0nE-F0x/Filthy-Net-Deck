[build]
  publish = "."
  # Optional: run pipeline before publish when wired to CI
  # command = "node ../pipeline/build-meta.mjs --seed"

# Force UTF-8 so em dashes / curly quotes never mojibake in browsers
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "/"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# CORS so the Tauri desktop app can fetch meta + version.json
[[headers]]
  for = "/meta/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept"
    Cache-Control = "public, max-age=120"

[[headers]]
  for = "/version.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept"
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
