# Fast lane for the set radar only (Scryfall + whatsinstandard — no scraping),
# so panel spoilers reach the app within hours instead of next-day.
# The full daily-meta workflow still covers 06:00 UTC; together: 4 refreshes/day.
name: Set radar refresh

on:
  schedule:
    - cron: "0 0,12,18 * * *"
  workflow_dispatch:

jobs:
  sets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      # Aborts without writing when Scryfall is unavailable — the previously
      # published sets.json stays live.
      - name: Build set radar (Arena-first spoilers, no Alchemy)
        id: build_sets
        run: npm run sets
        continue-on-error: true

      - name: Commit sets.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/meta/sets.json public/meta/sets.json || true
          if git diff --staged --quiet; then
            echo "No set radar changes"
          else
            git commit -m "chore: set radar refresh $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push
          fi

      - name: Open/update failure issue when the sets build fails
        if: steps.build_sets.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Set radar refresh failure';
            const body = [
              '## Set radar refresh reported a failure',
              '',
              `- run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- when: ${new Date().toISOString()}`,
              '',
              '- `npm run sets` failed (previous sets.json left untouched if abort).',
              '',
              '_Auto-opened so silent set-radar rot is impossible. Close when fixed._',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.data.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
